services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tulip
      POSTGRES_USER: tulip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d/init:ro
      - ../infra/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tulip -d tulip"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://tulip:${POSTGRES_PASSWORD}@postgres:5432/tulip
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_BASE_URL: https://api.${BASE_DOMAIN}
      CLIENT_CABINET_BASE_URL: https://client.${BASE_DOMAIN}
      COMPANY_CABINET_BASE_URL: https://company.${BASE_DOMAIN}
    depends_on:
      - api

  caddy:
    build:
      context: ..
      dockerfile: deploy/caddy/Dockerfile
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
