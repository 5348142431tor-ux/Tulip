version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rieltora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rieltora
      POSTGRES_USER: rieltora
      POSTGRES_PASSWORD: rieltora_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rieltora -d rieltora"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: rieltora-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
